  - id: task-005
    title: Backend — WebSocket audio endpoint
    description: |
      Implement backend/app/ws/audio.py and register in main.py:
        - APIRouter with WebSocket route /ws/audio
        - Per-connection state machine: IDLE → BUFFERING → TRANSCRIBING → LLM_CALLING → IDLE
        - On JSON "start" event: reset audio_buffer = bytearray(), transition to BUFFERING
        - On binary frame: append to audio_buffer (only in BUFFERING state)
        - On JSON "stop" event:
            1. Send {"event":"status","state":"transcribing"}
            2. transcript = await transcriber.transcribe(bytes(audio_buffer))
            3. Send {"event":"transcript","text": transcript}
            4. Send {"event":"status","state":"thinking"}
            5. response = await llm_client.chat(transcript)
            6. Send {"event":"llm_response","text": response}
            7. Reset buffer, return to IDLE
        - On disconnect/exception: clean up buffer, log error
        - Error handling: catch transcription and LLM errors; send {"event":"error",...} to client
        - Register router in main.py: app.include_router(ws_router)
    agent: gem-team/gem-implementer
    priority: high
    status: done
    dependencies:
