domain_security_considerations:
  sensitive_areas:
    - area: Microphone access
      location: src/hooks/useAudioStream.ts
      concern: >
        getUserMedia must only be called on user gesture (click). Do NOT auto-request on load.
        Permissions API can be queried first (navigator.permissions.query({name:'microphone'}))
        to show appropriate prompt UI before requesting.
    - area: WebSocket origin
      location: src/hooks/useWebSocket.ts
      concern: >
        In production, use WSS (wss://). In dev, ws://localhost is acceptable.
        Backend should validate origin header to prevent cross-site WebSocket hijacking.
  authentication_patterns_in_domain: N/A (local LM Studio deployment, no auth required initially)
  authorization_patterns_in_domain: N/A
  data_validation_in_domain: >
    All incoming WebSocket messages must be validated against ServerMessage discriminated union
    before dispatch. Malformed JSON should be caught and dispatched as ERROR phase.

testing_patterns:
  framework: Vitest + @testing-library/react + Playwright (E2E)
  coverage_areas:
    - chatReducer state transitions (pure function, easy to test exhaustively)
    - MessageBubble rendering per role (user/assistant)
    - MicButton disabled states by phase
    - useWebSocket reconnect logic with mock-socket
    - useAudioStream MIME type fallback selection
  test_organization: >
    Unit tests co-located as *.test.tsx alongside source files.
    E2E tests in e2e/ at repo root.
  mock_patterns:
    - vi.stubGlobal('WebSocket', MockWebSocket) for WS hook tests
    - navigator.mediaDevices.getUserMedia = vi.fn().mockResolvedValue(mockStream)
    - HTMLCanvasElement.prototype.getContext mocked for WaveformBar canvas tests

open_questions:
  - question: Should recording be push-to-talk (hold/click) or VAD (voice activity detection)?
    context: >
      VAD requires AudioWorklet + threshold logic on frontend, or silence detection on backend.
      Push-to-talk is simpler and more reliable for MVP. Both approaches affect the
      MicButton UX and end_of_speech signal timing.

  - question: Does WaveformBar use Canvas 2D API or WebGL?
    context: >
      Canvas 2D is sufficient for a simple bar/line waveform. WebGL (via Three.js or raw)
      unlocks more elaborate cyberpunk visual effects but adds bundle size and complexity.

  - question: Should the chat thread persist across page reloads?
    context: >
      localStorage/IndexedDB persistence of messages[] is a UX improvement but adds
      complexity. Relevant to whether a useEffect sync to storage is needed in chatReducer.

  - question: What is the exact binary format the Python backend expects?
    context: >
      Whisper works best with 16kHz mono PCM WAV. MediaRecorder typically outputs audio/webm
      (Opus codec). Backend may need to handle format conversion (ffmpeg/soundfile), OR frontend
      could use AudioWorklet to emit raw PCM. This affects useAudioStream implementation.

  - question: Will the LLM response stream token-by-token or arrive as a complete message?
    context: >
      If streaming, the WS protocol needs a token-delta message type and ChatThread must
      support partial message rendering (streaming cursor effect). If batch, simpler.

gaps:
  - area: Backend WebSocket message contract (exact field names/types)
    description: Python backend not yet built; ServerMessage types are assumed based on common patterns
    impact: >
      Types in src/types/ws.ts may need adjustment once backend is implemented.
      Low risk — types are easily updated.

  - area: Audio format negotiation with Whisper backend
    description: >
      Whether backend accepts audio/webm directly or requires PCM is unknown.
      Affects useAudioStream implementation significantly (webm passthrough vs AudioWorklet PCM).
    impact: >
      High impact on useAudioStream complexity. If PCM required, AudioWorklet adds
      ~100 lines of additional code and a separate worklet JS file.

  - area: Deployment target (localhost only vs production URL)
    description: VITE_WS_URL and CSP headers not yet defined
    impact: Low for MVP; relevant before any deployment beyond localhost.
