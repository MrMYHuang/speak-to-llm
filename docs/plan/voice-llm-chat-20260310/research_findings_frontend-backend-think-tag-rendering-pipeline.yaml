plan_id: voice-llm-chat-20260310
objective: "Trace the current frontend/backend pipeline for assistant response rendering, with emphasis on <think> tag handling and change surfaces for collapsible think-block display."
focus_area: frontend/backend think-tag rendering pipeline
created_at: "2026-03-13T00:00:00Z"
created_by: GitHub Copilot
status: completed

tldr: |
  - Backend websocket handling sanitizes LLM replies before emitting `llm_response`, removing `<think>...</think>` blocks and truncating open-ended `<think` content, so raw think text is currently unavailable to the frontend on the live `/ws/audio` path.
  - Frontend still contains a think-tag parsing/rendering path: assistant messages are stored as plain `text`, `MessageBubble` calls `splitAssistantMessage`, and `think` segments render neon green, but only if raw tags are already present in `message.text`.
  - Primary pipeline files are `backend/app/ws/audio.py`, `frontend/src/hooks/useWebSocket.ts`, `frontend/src/store/chatReducer.ts`, `frontend/src/components/MessageBubble.tsx`, and `frontend/src/utils/assistantMessage.ts`; existing tests cover backend sanitization and frontend parsing separately, not end-to-end.
  - Current think styling inherits the assistant bubble's 20pt text size; there is no collapse/expand state, click handling, accessibility affordance, or dedicated test coverage for interactive think-block UI.

research_metadata:
  methodology: "Repository inspection using ripgrep for `<think>` and message-pipeline symbols, targeted file reads of websocket, reducer, rendering, parser, styles, and tests, and relationship tracing from backend LLM reply generation through frontend websocket parsing and message rendering."
  tools_used:
    - rg
    - glob
    - view
    - bash
  scope: "Focused on `/ws/audio` backend reply flow, frontend websocket consumption, message state, assistant rendering, think-tag parsing, styles, and related tests."
  confidence: high
  coverage: 90

