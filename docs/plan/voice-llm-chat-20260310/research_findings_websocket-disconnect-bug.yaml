patterns_found:
  - category: architecture
    pattern: send-time state remains LLM_CALLING until llm_response send completes
    description: >
      The backend sets `state = LLM_CALLING`, computes the reply, logs reply size,
      sends `llm_response`, and only then sets state to IDLE. A disconnect during
      send therefore naturally logs as `LLM_CALLING`.
    examples:
      - file: backend/app/ws/audio.py
        location: backend/app/ws/audio.py:135-166
        snippet: |
          state = _State.LLM_CALLING
          await _send({"type": "status", "state": "thinking"})
          reply = await llm.chat(text, history=list(conversation_history))
          conversation_history.extend([user_message, {"role": "assistant", "content": reply}])
          await _send({"type": "llm_response", "text": reply})
          state = _State.IDLE
    prevalence: common
  - category: structure
    pattern: backend serializes websocket text with native unicode preserved
    description: >
      The backend uses `json.dumps(..., ensure_ascii=False)` and logs byte counts using
      UTF-8 encoding, so Cyrillic and CJK text are intentionally supported.
    examples:
      - file: backend/app/ws/audio.py
        location: backend/app/ws/audio.py:56-58
        snippet: |
          payload = json.dumps(data, ensure_ascii=False, separators=(",", ":"))
          payload_size = len(payload.encode("utf-8"))
    prevalence: common
  - category: architecture
    pattern: frontend llm_response consumption is parse-and-dispatch only
    description: >
      The frontend does not inspect content for special characters before dispatching
      llm_response; it parses JSON, dispatches to the reducer, and renders.
    examples:
      - file: frontend/src/hooks/useWebSocket.ts
        location: frontend/src/hooks/useWebSocket.ts:104-115
        snippet: |
          const msg = parseServerMessage(ev.data)
          if (msg !== null) {
            dispatchRef.current({ type: 'SERVER_MSG', msg })
          }
      - file: frontend/src/store/chatReducer.ts
        location: frontend/src/store/chatReducer.ts:143-151
        snippet: |
          if (msg.type === 'llm_response') {
            return {
              ...state,
              phase: 'responding',
              messages: [...state.messages, { id: crypto.randomUUID(), role: 'assistant', text: msg.text, timestamp: Date.now() }],
            }
          }
    prevalence: common
  - category: testing
    pattern: unicode and large payload tests exist, send-time disconnect tests do not
    description: >
      Existing tests validate unicode/large payload correctness, but not a client close
      racing with transcript or llm_response delivery.
    examples:
      - file: backend/tests/test_ws_audio.py
        location: backend/tests/test_ws_audio.py:122-178
        snippet: |
          def test_unicode_transcript_and_llm_response_round_trip_over_websocket() -> None: ...
          def test_large_unicode_llm_response_round_trip_over_websocket() -> None: ...
      - file: backend/tests/test_ws_audio.py
        location: backend/tests/test_ws_audio.py:309-323
        snippet: |
          def test_client_disconnect_does_not_crash_server() -> None: ...
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: /ws/audio handler
      responsibility: Receive audio/control frames, transcribe audio, call LLM, send transcript and llm_response events
      location: backend/app/ws/audio.py
      relationship_to_domain: primary investigated component
    - component: frontend websocket hook
      responsibility: Maintain browser WebSocket connection and dispatch parsed server events
      location: frontend/src/hooks/useWebSocket.ts
      relationship_to_domain: consumes llm_response and can explicitly close only on cleanup
    - component: assistant renderer
      responsibility: Split `<think>` blocks for display and render message segments
      location: frontend/src/utils/assistantMessage.ts and frontend/src/components/MessageBubble.tsx
      relationship_to_domain: post-receive rendering path for suspect payload contents
  interfaces_used_by_domain:
    - interface: fastapi.WebSocket.send_text
      location: backend/app/ws/audio.py:67
      usage_pattern: sends serialized JSON text payloads; raises on disconnect
    - interface: browser WebSocket.onmessage/onclose/close
      location: frontend/src/hooks/useWebSocket.ts:104-166
      usage_pattern: parses incoming text frames and only closes explicitly during cleanup
  data_flow_involving_domain: |
    backend receives `stop`
      -> state TRANSCRIBING -> send transcript
      -> state LLM_CALLING -> send `status: thinking`
      -> await llm.chat(...)
      -> send `llm_response`
      -> set state IDLE -> send `status: idle`

    frontend receives websocket text frame
      -> `parseServerMessage`
      -> `dispatch({ type: 'SERVER_MSG', msg })`
      -> reducer appends assistant message
      -> `splitAssistantMessage` and `MessageBubble` render text / think segments
  key_relationships_to_domain:
    - from: backend/app/ws/audio.py
      to: app.services.llm_client.LLMClient
      relationship: calls
    - from: frontend/src/hooks/useWebSocket.ts
      to: frontend/src/types/ws.ts
      relationship: calls
    - from: frontend/src/hooks/useWebSocket.ts
      to: frontend/src/store/chatReducer.ts
      relationship: dispatches to
    - from: frontend/src/components/MessageBubble.tsx
      to: frontend/src/utils/assistantMessage.ts
      relationship: calls

