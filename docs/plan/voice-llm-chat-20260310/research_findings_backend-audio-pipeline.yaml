# ─────────────────────────────────────────────
# PATTERNS FOUND (from research, not existing code)
# ─────────────────────────────────────────────
patterns_found:
  - category: architecture
    pattern: "Separation of transport (WebSocket router) from processing (services)"
    description: >
      WebSocket handler owns only connection lifecycle and state-machine transitions.
      Transcription and LLM calls are delegated to service modules (transcriber.py, llm_client.py).
    examples:
      - file: "app/ws/audio.py"
        location: "ws/audio.py:websocket_audio"
        snippet: |
          transcript = await transcriber.transcribe(audio_buffer)
          reply = await llm_client.call(transcript)
          await websocket.send_text(json.dumps({"event": "llm_response", "text": reply}))
    prevalence: common

  - category: structure
    pattern: "App-state singleton for expensive resources"
    description: >
      Whisper model and OpenAI client instantiated once in lifespan, stored on app.state,
      injected into handlers via FastAPI dependencies.
    examples:
      - file: "app/main.py"
        location: "main.py:lifespan"
        snippet: |
          @asynccontextmanager
          async def lifespan(app: FastAPI):
              app.state.whisper = whisper.load_model("base")
              app.state.llm = AsyncOpenAI(base_url=settings.LM_STUDIO_BASE_URL, api_key="lm-studio")
              yield
    prevalence: common

  - category: error_handling
    pattern: "Pipeline errors serialized to WebSocket error events"
    description: >
      try/except around transcription and LLM call; errors sent as JSON {"event":"error",...}
      rather than closing the WebSocket, allowing frontend to recover gracefully.
    examples:
      - file: "app/ws/audio.py"
        location: "ws/audio.py:handle_stop"
        snippet: |
          except Exception as exc:
              await ws.send_text(json.dumps({"event": "error", "code": "PIPELINE_ERROR", "message": str(exc)}))
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: "FastAPI WebSocket router"
      responsibility: "Accept WS connection, demux binary/text frames, maintain per-connection state machine"
      location: "backend/app/ws/audio.py"
      relationship_to_domain: "Entry point for all audio data"
    - component: "Whisper transcription service"
      responsibility: "Convert PCM numpy array to text, async-safe via executor"
      location: "backend/app/services/transcriber.py"
      relationship_to_domain: "Consumes audio buffer, produces transcript string"
    - component: "LLM client service"
      responsibility: "POST to LM Studio /v1/chat/completions, return response text"
      location: "backend/app/services/llm_client.py"
      relationship_to_domain: "Consumes transcript, produces LLM reply"
    - component: "Settings / config"
      responsibility: "Read env vars: WHISPER_MODEL, LM_STUDIO_BASE_URL, LM_STUDIO_MODEL"
      location: "backend/app/core/config.py"
      relationship_to_domain: "Configures both service modules"
  data_flow_involving_domain: |
    Browser AudioWorklet → [binary PCM chunks over WS] → audio_buffer bytearray
    → (on stop event) → np.frombuffer + resample → whisper.model.transcribe (executor)
    → transcript text → AsyncOpenAI.chat.completions.create → reply text
    → JSON {"event":"llm_response"} → WebSocket → Frontend
  key_relationships_to_domain:
    - from: "ws/audio.py"
      to: "services/transcriber.py"
      relationship: calls
    - from: "ws/audio.py"
      to: "services/llm_client.py"
      relationship: calls
    - from: "services/transcriber.py"
      to: "openai-whisper (torch)"
      relationship: imports
    - from: "services/llm_client.py"
      to: "openai SDK → LM Studio HTTP"
      relationship: calls

