related_conventions:
  naming_patterns_in_domain: Test files are colocated with source and use `*.test.tsx` or `*.test.ts`; components and props use PascalCase exports, while derived booleans like `isRecording` are named explicitly.
  structure_of_domain: UI behavior tests prefer one file per component/hook area, with App-level toggle scenarios in `App.toggle.test.tsx` and hook state coverage in `hooks/useAudioStream.test.tsx`.
  error_handling_in_domain: Existing tests cover error-adjacent recording behavior by driving reducer errors and asserting the control remains stoppable (`frontend/src/App.toggle.test.tsx:203-223`).
  testing_in_domain: Prefer jsdom, Testing Library, `userEvent.setup()`, and accessible role/name assertions; fall back to DOM selectors only for decorative canvas elements.
  documentation_in_domain: Source files contain concise inline comments describing lifecycle intent, e.g. waveform hook comments in `frontend/src/hooks/useWaveform.ts:1-16`.

related_dependencies:
  internal:
    - component: frontend/src/App.tsx
      relationship_to_domain: provides footer phase and analyser ref to recording UI tests
      direction: inbound
    - component: frontend/src/components/BottomBar.tsx
      relationship_to_domain: primary render point for waveform visibility logic
      direction: bidirectional
    - component: frontend/src/hooks/useWaveform.ts
      relationship_to_domain: supplies amplitudes to WaveformBar regardless of visibility changes
