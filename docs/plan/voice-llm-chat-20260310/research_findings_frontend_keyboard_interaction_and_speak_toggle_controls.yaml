patterns_found:
  - category: architecture
    pattern: container-owned toggle logic with presentational button
    description: recording behavior is decided in `App`, while footer/button components only render phase-dependent UI and forward the callback.
    examples:
      - file: frontend/src/App.tsx
        location: frontend/src/App.tsx:30-48
        snippet: "const handleMicToggle = useCallback(() => { if (captureState !== 'idle') { stopRecording(); return } ... })"
      - file: frontend/src/components/MicButton.tsx
        location: frontend/src/components/MicButton.tsx:72-72
        snippet: "onClick={() => !disabled && onToggle()}"
    prevalence: common
  - category: accessibility
    pattern: native button semantics drive current keyboard support
    description: the mic control is a real button with `type=button`, `aria-label`, `aria-pressed`, and disabled state, so focused Enter/Space activation comes from browser defaults.
    examples:
      - file: frontend/src/components/MicButton.tsx
        location: frontend/src/components/MicButton.tsx:59-63
        snippet: "<button type=\"button\" aria-label={ariaLabel} aria-pressed={isPressed} disabled={disabled}>"
