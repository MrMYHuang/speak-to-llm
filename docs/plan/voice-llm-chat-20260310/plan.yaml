plan_id: voice-llm-chat-20260310
objective: >
  Preserve the shipped voice-first LLM chat app and completed backend hardening work while
  adding a follow-up execution wave: expose assistant `<think>` text to the client for
  collapsible cyberpunk-green 14pt rendering and allow the speak / stop toggle to be
  triggered by the Space key without changing the websocket message shape.
created_at: "2026-03-10"
created_by: gem-team/gem-planner
status: completed
research_confidence: high

tldr: |
  Existing waves task-001 through task-014 remain completed and preserved.
  Follow-up Wave 8 is planned: task-015 through task-018 add raw `<think>` delivery to
  the live client path, collapsible 14pt neon-green think-block rendering, and a guarded
  page-level Space shortcut that reuses the existing speak / stop toggle contract.
  The execution assumption for keyboard handling is that focused button Enter/Space keeps
  native semantics, while an unfocused Space press triggers the mic toggle only when the
  event target is not an editable or interactive control.

open_questions:
  - If a future text input or prompt editor is added, the global Space shortcut should be
    disabled while that control is focused; this wave assumes no such editable control is
    currently present, so implementation can proceed without blocking.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Whisper model download blocks first run (model not cached on dev machine)
      likelihood: medium
      impact: high
      mitigation: >
        Document `uv run python -c "import whisper; whisper.load_model('base')"` pre-flight step
        in README. task-010 smoke test catches this early.
    - scenario: Browser sends audio at 48 kHz; backend Whisper receives wrong sample rate → garbage transcript
      likelihood: high
      impact: high
      mitigation: >
        Frontend AudioWorklet resamples to 16 kHz before sending (task-007).
        Backend config.py documents expected sample rate. task-010 validates with a real audio chunk.
    - scenario: LM Studio not running or model not loaded when validation runs
      likelihood: medium
      impact: medium
      mitigation: >
        Backend /healthz endpoint includes optional LM Studio ping (non-fatal); README documents
        prerequisite. Validation task-010 marks LLM check as advisory, not blocking.
    - scenario: MediaRecorder MIME type unsupported in target browser (Safari)
      likelihood: low
      impact: medium
      mitigation: >
        useAudioStream hook negotiates MIME type at runtime with MediaRecorder.isTypeSupported().
        Falls back gracefully with user-visible error. Documented as known Safari limitation.
    - scenario: FastAPI WebSocket handler blocks event loop during model.transcribe() call
      likelihood: high
      impact: high
      mitigation: >
        Transcription always runs inside asyncio.get_event_loop().run_in_executor(None, _run)
        — enforced in task-003 implementation spec and verified in task-010.
    - scenario: Sanitization removes visible assistant content outside `<think>` blocks or stores unsanitized text in conversation history
      likelihood: medium
      impact: high
      mitigation: >
        Sanitize once in the backend reply path and add regression tests that cover mixed
        visible text, large replies, and persisted conversation history expectations.
    - scenario: The bugfix changes websocket behavior for normal unicode payloads and reintroduces encoding regressions
      likelihood: low
      impact: high
      mitigation: >
        Keep the existing `json.dumps(..., ensure_ascii=False)` send path unchanged and add
        regression coverage for large sanitized unicode replies plus disconnect-during-send behavior.

    - scenario: Toggle interactions fire duplicate start/stop calls and leave the UI stuck in recording or processing
      likelihood: medium
      impact: medium
      mitigation: >
        Route all mic presses through a single phase-aware toggle handler in App, keep
        useAudioStream start/stop behavior idempotent, and add focused frontend tests for
        click/tap and keyboard toggle flows.
    - scenario: Raw `<think>` text is reintroduced to the websocket reply path but also leaks into persisted assistant history or breaks disconnect handling expectations
      likelihood: medium
      impact: high
      mitigation: >
        Keep a dual-path reply flow in `backend/app/ws/audio.py`: send raw LLM text to the
        client, persist only the sanitized assistant text, and update backend tests to
        assert both outbound and stored-history behavior under normal and disconnect cases.
    - scenario: Think blocks inherit the assistant bubble typography or become inaccessible because collapse state is rendered as plain text spans instead of an interactive control
      likelihood: medium
      impact: medium
      mitigation: >
        Render each think segment through a dedicated interactive affordance with explicit
        14pt neon-green styling, collapsed-by-default state, and focused frontend tests for
        click/keyboard expansion state and visible body typography.
    - scenario: A global Space shortcut scrolls the page, hijacks future editable controls, or double-fires alongside native focused button activation
      likelihood: medium
      impact: high
      mitigation: >
        Reuse `handleMicToggle` from an App-owned key handler that ignores editable and
        interactive targets, skips modified key presses, relies on native button behavior
        when the mic button already owns focus, and only calls `preventDefault()` when the
        shortcut is actually handled.

  assumptions:
    - Developer has Python 3.11+, Node.js 20+, pnpm, uv, and git installed locally.
    - LM Studio is installed separately and a model is already loaded before running validation.
    - macOS/Linux dev environment (scripts/dev.sh uses bash; Windows users need WSL or manual steps).
    - No CI/CD pipeline is in scope for this plan; local dev workflow only.
    - Audio is captured as PCM Int16 at 16 kHz mono by the frontend AudioWorklet.
    - Whisper "base" model (~74 M params) is sufficient for dev; env var allows override.
    - The observed websocket failure is caused by a peer/client close during send, not by unicode or a 5.6 KB payload size.
    - 'The backend websocket message shape remains `{ type: "llm_response", text: string }`
      even when `text` now contains raw `<think>` tags for the live client render path.'
    - Page-level Space activation means an App-owned global shortcut when focus is outside
      buttons, links, inputs, textareas, selects, or contenteditable regions; focused mic
      button activation continues to use native browser semantics.
    - Think text should be visible in the frontend only; persisted assistant conversation
      history remains sanitized so prior backend safety guarantees still hold.
    - Frontend follow-up scope now includes think-block rendering plus guarded keyboard
      activation while keeping the backend websocket `start` / `stop` control contract unchanged.

implementation_specification:
  code_structure: |
    speak-to-llm/                    ← repo root
    ├── backend/
    │   ├── app/
    │   │   ├── __init__.py
    │   │   ├── main.py              ← FastAPI app factory + lifespan (Whisper load)
    │   │   ├── core/
    │   │   │   ├── __init__.py
    │   │   │   └── config.py        ← pydantic-settings (env vars)
    │   │   ├── services/
    │   │   │   ├── __init__.py
    │   │   │   ├── transcriber.py   ← Whisper wrapper (async-safe via run_in_executor)
    │   │   │   └── llm_client.py    ← LM Studio / openai SDK wrapper
    │   │   └── ws/
    │   │       ├── __init__.py
    │   │       └── audio.py         ← WebSocket /ws/audio endpoint + state machine
    │   ├── tests/
    │   │   └── test_smoke.py
    │   └── pyproject.toml
    ├── frontend/
    │   ├── src/
    │   │   ├── main.tsx
    │   │   ├── App.tsx
    │   │   ├── store/
    │   │   │   └── chatReducer.ts   ← useReducer state machine
    │   │   ├── hooks/
    │   │   │   ├── useAudioStream.ts  ← MediaRecorder + AudioWorklet, 16 kHz PCM
    │   │   │   ├── useWebSocket.ts    ← WebSocket lifecycle + message dispatch
    │   │   │   └── useWaveform.ts     ← AnalyserNode → amplitude array for canvas
    │   │   ├── components/
    │   │   │   ├── TopBar.tsx
    │   │   │   ├── ChatThread.tsx
    │   │   │   ├── MessageBubble.tsx
    │   │   │   ├── WaveformBar.tsx
    │   │   │   ├── BottomBar.tsx
    │   │   │   ├── MicButton.tsx
    │   │   │   └── StatusOverlay.tsx
    │   │   ├── types/
    │   │   │   └── ws.ts            ← ServerMessage discriminated union
    │   │   └── styles/
    │   │       └── index.css        ← cyberpunk CSS custom properties
    │   ├── index.html
    │   ├── vite.config.ts           ← ws proxy to :8000
    │   ├── tailwind.config.ts
    │   ├── tsconfig.json
    │   └── package.json
    ├── scripts/
    │   └── dev.sh                   ← concurrently starts both services
    ├── Makefile                     ← make dev / make test / make lint
    ├── .env.example
    ├── .gitignore
    └── README.md

  affected_areas:
    - Repo root (Makefile, .gitignore, .env.example, README.md, scripts/)
    - backend/ (full Python service: FastAPI, Whisper, LM Studio client)
    - backend/app/ws/audio.py and backend/tests/test_ws_audio.py for dual-path think-tag delivery, sanitized history persistence, and send-race regression coverage
    - frontend/src/types/ws.ts, frontend/src/hooks/useWebSocket.ts, and frontend/src/store/chatReducer.ts for preserving tagged assistant text without changing the websocket envelope
    - frontend/src/utils/assistantMessage.ts and frontend/src/components/MessageBubble.tsx for collapsible 14pt neon-green think-block parsing and presentation
    - frontend/src/App.tsx, frontend/src/components/BottomBar.tsx, frontend/src/components/MicButton.tsx, and any small App-owned keyboard shortcut hook for guarded Space-key triggering
    - frontend test files covering toggle click/tap, global Space-key behavior, and think-block expand/collapse rendering

  component_details:
    - component: backend/app/core/config.py
      responsibility: >
        Load all runtime config from environment / .env via pydantic-settings.
        Exposes: WHISPER_MODEL (default "base"), LM_STUDIO_BASE_URL, LM_STUDIO_MODEL,
        CORS_ORIGINS, HOST, PORT.
      interfaces:
        - "settings: Settings = Settings()"

    - component: backend/app/services/transcriber.py
      responsibility: >
        Load Whisper model once (stored on app.state.whisper_model).
        Provide async transcribe(audio_bytes: bytes, sample_rate: int) -> str
        using run_in_executor to avoid blocking the event loop.
      interfaces:
        - "async def transcribe(audio_bytes: bytes, sample_rate: int = 16000) -> str"
        - "def load_model(model_name: str) -> whisper.Whisper"

    - component: backend/app/services/llm_client.py
      responsibility: >
        Thin async wrapper around the openai SDK pointed at LM Studio base URL.
        Sends transcript as user message, returns assistant text.
      interfaces:
        - "async def chat(transcript: str) -> str"

    - component: backend/app/ws/audio.py
      responsibility: >
        WebSocket endpoint at /ws/audio. Implements server-side state machine:
        IDLE → BUFFERING (on "start" event) → TRANSCRIBING (on "stop" event)
        → LLM_CALLING → IDLE. Sends raw assistant text, including `<think>` tags, to the
        live `llm_response` client path while still sanitizing persisted assistant history
        and preserving normal unicode JSON payloads plus existing disconnect handling.
      interfaces:
        - "@router.websocket('/ws/audio') async def ws_audio_endpoint(ws, app)"
        - "def sanitize_llm_reply(text: str) -> str"

    - component: frontend/src/store/chatReducer.ts
      responsibility: >
        useReducer state machine: Phase (idle | requesting-mic | recording |
        processing | responding | error) × WsStatus × messages[] × transcript.
        Preserves assistant `text` as the raw websocket payload so think tags can be
        rendered client-side without adding new backend-facing phases.
      interfaces:
        - "type Phase"
        - "type ChatState"
        - "chatReducer(state, action) → ChatState"

    - component: frontend/src/hooks/useAudioStream.ts
      responsibility: >
        getUserMedia → AudioContext (16 kHz) → AudioWorkletNode capturing PCM Int16
        chunks → sends binary frames over WebSocket ref. Sends JSON "start"/"stop"
        control events and keeps start/stop paths safe when the mic button is used as a
        toggle instead of press-and-hold.
      interfaces:
        - "useAudioStream(wsRef, dispatch): { startRecording, stopRecording, analyserRef }"

    - component: frontend/src/hooks/useWebSocket.ts
      responsibility: >
        Manages WebSocket lifecycle (connect/reconnect on 1006/error). Parses
        incoming JSON frames and dispatches appropriate actions to chatReducer.
      interfaces:
        - "useWebSocket(url, dispatch): { wsRef, wsStatus }"

    - component: frontend/src/hooks/useWaveform.ts
      responsibility: >
        Reads analyserRef frequency data on requestAnimationFrame and returns
        amplitude array for WaveformBar canvas rendering.
      interfaces:
        - "useWaveform(analyserRef): { amplitudes: Float32Array }"

    - component: frontend/src/App.tsx
      responsibility: >
        Orchestrates reducer state, websocket/audio hooks, and the single mic toggle entry
        point. Owns the guarded page-level Space shortcut so keyboard activation reuses the
        same phase-aware `handleMicToggle` semantics as pointer input.
      interfaces:
        - "handleMicToggle(): void"

    - component: frontend/src/utils/assistantMessage.ts
      responsibility: >
        Splits assistant message strings into ordered visible-text and think segments,
        including support for open-ended `<think>` content that should render until the end
        of the message when no closing tag is present.
      interfaces:
        - "splitAssistantMessage(text: string): AssistantMessageSegment[]"

    - component: frontend/src/components/MessageBubble.tsx
      responsibility: >
        Renders assistant visible text plus dedicated collapsible think blocks. Think blocks
        default to collapsed, expand/collapse on click, and use cyberpunk neon-green 14pt
        styling without inheriting the assistant bubble's larger typography.
      interfaces:
        - "MessageBubble({ message }: MessageBubbleProps)"

    - component: frontend/src/components/* (UI layer)
      responsibility: >
        Pure-ish presentation components. TopBar (ws status), ChatThread + MessageBubble
        (message history), WaveformBar (canvas waveform), BottomBar + MicButton (controls),
        StatusOverlay (transcribing/thinking states). MicButton presents a toggle
        interaction for start/stop recording while keeping cyberpunk tokens and accessibility.
      interfaces:
        - Props interfaces only; no internal I/O logic.

  dependencies:
    - component: backend/app/ws/audio.py
      relationship: calls transcriber.transcribe() and llm_client.chat() sequentially per utterance, then sends raw assistant text to the client while sanitizing only persisted assistant history
    - component: backend/app/main.py
      relationship: registers ws router; lifespan calls transcriber.load_model() and stores on app.state
    - component: frontend/src/App.tsx
      relationship: composes useWebSocket + useAudioStream + useWaveform; routes a phase-aware mic toggle into components and owns the guarded global Space shortcut
    - component: frontend/src/components/MessageBubble.tsx
      relationship: depends on assistantMessage.ts segment parsing and local collapse state to render think blocks independently from the stored message text

  integration_points:
    - "WebSocket ws://localhost:5173/ws/audio in dev (Vite proxy → localhost:8000/ws/audio)"
    - "Vite server.proxy config in frontend/vite.config.ts bridges frontend port 5173 to backend port 8000"
    - ".env.example documents VITE_WS_URL, VITE_APP_TITLE, LM_STUDIO_BASE_URL, LM_STUDIO_MODEL, WHISPER_MODEL"
    - "scripts/dev.sh runs `uv run uvicorn` and `pnpm dev` concurrently via & wait or npx concurrently"
    - "Backend /healthz GET endpoint for readiness check (used by smoke test and README instructions)"
    - "Mic control keeps the existing websocket `start` / `stop` events; keyboard and pointer paths both reuse the same frontend toggle handler"
    - "Backend `llm_response` delivery remains UTF-8 JSON with `ensure_ascii=False` and the same `{type,text}` envelope; only persisted assistant history stays sanitized"
    - "Assistant rendering continues to split `llm_response.text` client-side, but think segments now render as collapsible neon-green 14pt blocks rather than inheriting bubble typography"
    - "App-level key handling intercepts unfocused Space presses only when no editable or interactive element owns the event target, preventing page scroll for handled toggles"

