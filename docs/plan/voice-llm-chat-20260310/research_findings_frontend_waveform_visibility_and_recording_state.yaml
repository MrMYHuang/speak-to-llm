related_conventions:
  naming_patterns_in_domain: Boolean UI guards use explicit names like `isRecording`; phase values are string unions such as `idle`, `requesting-mic`, `recording`, and `processing`.
  structure_of_domain: App-level hooks own side effects and pass derived state into narrow presentation components; BottomBar is the localized place to change waveform visibility.
  error_handling_in_domain: Mic failures are normalized in `useAudioStream` into reducer actions/messages; waveform code itself degrades silently when no analyser or canvas context exists.
  testing_in_domain: Existing tests validate user-visible state transitions at the App level and lifecycle guarantees at the hook level.
  documentation_in_domain: Hook files contain detailed header comments describing lifecycle and waveform behavior.

related_dependencies:
  internal:
    - component: frontend/src/hooks/useAudioStream.ts
      relationship_to_domain: Supplies analyser lifecycle and recording state to the waveform UI.
      direction: outbound
    - component: frontend/src/hooks/useWaveform.ts
      relationship_to_domain: Supplies amplitude arrays to the waveform renderer.
      direction: outbound
    - component: frontend/src/store/chatReducer.ts
      relationship_to_domain: Supplies post-stop phases (`processing`, `error`, etc.) consumed by the footer.
      direction: outbound
  external:
    - name: react
      purpose_for_domain: Hook-driven state and rendering.
    - name: vitest
      purpose_for_domain: Relevant automated validation.
    - name: @testing-library/react
      purpose_for_domain: UI and hook tests.

testing_patterns:
  framework: Vitest with Testing Library
  coverage_areas:
    - App-level mic toggle click/keyboard flows
    - useAudioStream start/cancel/stop lifecycle and idempotency
  test_organization: Tests live alongside source files in `frontend/src/`.
  mock_patterns:
    - `App.toggle.test.tsx` mocks `useAudioStream` and `useWebSocket` to isolate UI phase behavior.
    - `useAudioStream.test.tsx` stubs `AudioContext`, `AudioWorkletNode`, `URL`, and `navigator.mediaDevices`.

open_questions:
  - question: Should the waveform be hidden during `requesting-mic` as well as `processing`/`idle`/`error`?
    context: Current code computes `isRecording` strictly as `phase === 'recording'`; the requested behavior matches that guard, but a planner may want explicit confirmation that pre-permission state should remain hidden.

gaps:
  - area: Waveform-specific test coverage
    description: No existing test directly asserts that the waveform canvas is present only during active recording.
    impact: The implementation can be small and localized, but regression protection will require adding or updating a frontend UI test if planners want automated coverage.
