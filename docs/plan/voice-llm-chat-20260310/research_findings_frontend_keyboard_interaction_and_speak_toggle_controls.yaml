related_conventions:
  naming_patterns_in_domain: phase names and actions are explicit (`idle`, `requesting-mic`, `recording`, `processing`, `responding`, `error`; `MIC_REQUESTING`, `RECORD_STOP`).
  structure_of_domain: `App` owns behavior, hooks own side effects, and small components remain presentational.
  error_handling_in_domain: start failures dispatch friendly `MIC_ERROR` messages; active capture stop remains available through `captureState` even if reducer phase shifts to `error`.
  testing_in_domain: interaction tests live beside `App` and assert accessible role/name-based behavior rather than CSS or implementation details.
  documentation_in_domain: reducer and audio hook include detailed header comments describing phases and lifecycle expectations.

