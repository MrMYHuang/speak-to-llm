patterns_found:
  - category: architecture
    pattern: React state machine via useReducer
    description: >
      Audio recording flows through discrete phases (idle, requesting-mic, recording, uploading,
      processing, responding, error). useReducer maps naturally to this; avoids scattered useState
      flags that can get out of sync.
    examples:
      - file: src/store/chatReducer.ts (to be created)
        location: src/store/chatReducer.ts:1
        snippet: |
          type Phase = 'idle' | 'requesting-mic' | 'recording' | 'processing' | 'responding' | 'error';
          interface ChatState {
            phase: Phase;
            wsStatus: 'disconnected' | 'connecting' | 'connected' | 'error';
            transcript: string;
            messages: Message[];
            errorMessage: string | null;
          }
    prevalence: common

  - category: architecture
    pattern: Refs for imperative browser APIs
    description: >
      MediaRecorder and WebSocket are mutable imperative objects that must NOT be stored in React
      state (triggers unnecessary re-renders). Store them in useRef and interact via callback hooks.
    examples:
      - file: src/hooks/useAudioStream.ts (to be created)
        location: src/hooks/useAudioStream.ts:1
        snippet: |
          const socketRef = useRef<WebSocket | null>(null);
          const recorderRef = useRef<MediaRecorder | null>(null);
    prevalence: common

  - category: structure
    pattern: Feature-scoped hooks barrel
    description: >
      Each major capability (audio recording, WebSocket messaging, waveform analysis) lives in its
      own hook file under src/hooks/. Components stay presentation-only; all I/O logic in hooks.
    examples:
      - file: src/hooks/ (to be created)
        location: src/hooks/index.ts
        snippet: |
          export { useAudioStream } from './useAudioStream';
          export { useWebSocket } from './useWebSocket';
          export { useWaveform } from './useWaveform';
    prevalence: common

  - category: naming
    pattern: PascalCase components, camelCase hooks, SCREAMING_SNAKE constants
    description: Standard React/TS community convention; apply consistently for tooling compatibility.
    examples:
      - file: src/components/MicButton.tsx
        location: src/components/MicButton.tsx:1
        snippet: "export const MicButton: React.FC<MicButtonProps> = ..."
    prevalence: common

  - category: structure
    pattern: CSS custom property design tokens in index.css
    description: >
      Cyberpunk palette defined as CSS vars on :root, referenced in Tailwind theme extension.
      Allows runtime theme switching and keeps neon colors DRY.
    examples:
      - file: src/styles/index.css (to be created)
        location: src/styles/index.css:1
        snippet: |
          :root {
            --color-bg:       #0a0a0f;
            --color-surface:  #12121a;
            --color-neon-cyan: #00FFFF;
            --color-neon-pink: #FF00FF;
            --color-neon-green: #39FF14;
            --color-text:     #e0e0f0;
            --glow-cyan: 0 0 8px #00FFFF, 0 0 20px #00FFFF66;
            --glow-pink: 0 0 8px #FF00FF, 0 0 20px #FF00FF66;
          }
    prevalence: common

  - category: architecture
    pattern: WebSocket message protocol (JSON envelope)
    description: >
      Binary frames carry raw audio chunks. Text frames carry JSON control messages.
      Frontend sends: audio blobs (binary). Backend sends: JSON {type, payload} text frames.
    examples:
      - file: src/types/ws.ts (to be created)
        location: src/types/ws.ts:1
        snippet: |
          export type ServerMessage =
            | { type: 'transcript'; text: string }
            | { type: 'llm_response'; text: string }
            | { type: 'error'; message: string }
            | { type: 'status'; state: 'transcribing' | 'thinking' };
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: App
      responsibility: Root component; owns ChatState via useReducer; wires hooks to child components
      location: src/App.tsx
      relationship_to_domain: top-level orchestrator

    - component: TopBar
      responsibility: Displays app title and WebSocket connection status badge
      location: src/components/TopBar.tsx
      relationship_to_domain: reads wsStatus from context/props

    - component: ChatThread
      responsibility: Scrollable list of user transcript and assistant response Message bubbles
      location: src/components/ChatThread.tsx
      relationship_to_domain: renders messages[] from state; auto-scrolls on new message

    - component: MessageBubble
      responsibility: Single message item; styled differently for user vs assistant role
      location: src/components/MessageBubble.tsx
      relationship_to_domain: pure presentational; no state

    - component: WaveformBar
      responsibility: Real-time audio amplitude visualisation using Canvas/Web Audio AnalyserNode
      location: src/components/WaveformBar.tsx
      relationship_to_domain: active only during 'recording' phase; reads analyserRef from useWaveform

    - component: BottomBar
      responsibility: Contains MicButton and TranscriptPreview; main user interaction zone
      location: src/components/BottomBar.tsx
      relationship_to_domain: dispatches startRecording/stopRecording actions

    - component: MicButton
      responsibility: Large neon push-to-talk button; visual state indicates recording/processing/idle
      location: src/components/MicButton.tsx
      relationship_to_domain: triggers audio start/stop; CSS animation class driven by phase

    - component: StatusOverlay
      responsibility: Full-screen semi-transparent overlay showing "Transcribing…" / "Thinking…" status
      location: src/components/StatusOverlay.tsx
      relationship_to_domain: shown during 'processing' and 'responding' phases

  interfaces_used_by_domain:
    - interface: MediaDevices.getUserMedia
      location: browser (Web API)
      usage_pattern: called in useAudioStream.start(); stream fed to MediaRecorder and AudioContext

    - interface: MediaRecorder
      location: browser (Web API)
      usage_pattern: >
        recorder.start(250) for 250ms chunk intervals; ondataavailable sends blob via WebSocket;
        onstop signals end-of-utterance to backend with a sentinel JSON frame

    - interface: WebSocket
      location: browser (Web API)
      usage_pattern: >
        ws://localhost:8765 (dev); binaryType='arraybuffer' or 'blob';
        onmessage parses JSON ServerMessage and dispatches to chatReducer

    - interface: Web Audio API (AudioContext + AnalyserNode)
      location: browser (Web API)
      usage_pattern: >
        AnalyserNode.getByteTimeDomainData() drives WaveformBar canvas rendering at ~60fps via rAF

  data_flow_involving_domain: |
    User clicks MicButton
      → useAudioStream.start()
        → getUserMedia() → MediaRecorder.start(250)
        → AudioContext/AnalyserNode branch → WaveformBar canvas
        → WebSocket open (if not already)
      → App phase: 'recording'

    MediaRecorder.ondataavailable (every 250ms)
      → ws.send(blob)   [binary frame]

    User clicks MicButton again (or VAD silence detected)
      → MediaRecorder.stop()
      → ws.send(JSON.stringify({type:'end_of_speech'}))
      → App phase: 'processing'

    WebSocket.onmessage (type:'transcript')
      → dispatch({ type: 'SET_TRANSCRIPT', text })
      → App phase: 'responding' (waiting for LLM)

    WebSocket.onmessage (type:'llm_response')
      → dispatch({ type: 'ADD_MESSAGE', role:'assistant', text })
      → App phase: 'idle'

  key_relationships_to_domain:
    - from: App
      to: useAudioStream
      relationship: calls
    - from: App
      to: useWebSocket
      relationship: calls
    - from: useAudioStream
      to: useWaveform
      relationship: composes (shares AudioContext stream)
    - from: App
      to: ChatState (useReducer)
      relationship: owns
    - from: ChatThread
      to: ChatState.messages
      relationship: reads
    - from: BottomBar
      to: ChatState.phase
      relationship: reads
    - from: MicButton
      to: useAudioStream.start/stop
      relationship: calls

