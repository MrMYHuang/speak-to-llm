open_questions:
  - question: What browser close code and reason were observed on the client for the failing session?
    context: The backend only proves the peer disconnected during send; it does not identify whether the client closed normally, crashed, navigated away, or hit a browser/runtime error.
  - question: Is there any reverse proxy between browser and backend that could rewrite or terminate websocket frames?
    context: The investigated application code does not impose a 5.6 KB message limit, so an intermediary would be the remaining non-client path.

gaps:
  - area: backend send-race coverage
    description: No test simulates client disconnect during transcript or llm_response send.
    impact: Leaves the exact send-failure behavior and logging sequence unverified under the suspected production race.
  - area: frontend lifecycle coverage
    description: No automated test covers `useWebSocket` close behavior, cleanup-triggered close, or receipt of a long `<think>`-heavy llm_response through the actual hook/reducer/render path.
    impact: It is not directly verified in tests that the browser-side code remains mounted and does not close during end-to-end receipt of the suspect content.
