patterns_found:
  - category: architecture
    pattern: App derives a footer-friendly phase from capture state and reducer state.
    description: UI recording affordances prefer `captureState` when mic startup/recording is active, then fall back to reducer phase for idle/processing/responding/error states.
    examples:
      - file: frontend/src/App.tsx
        location: frontend/src/App.tsx:59-64
        snippet: "const controlPhase = captureState === 'idle' ? state.phase : captureState === 'starting' ? 'requesting-mic' : 'recording'"
    prevalence: common
  - category: structure
    pattern: BottomBar is the single composition point for waveform, transcript preview, and mic control.
    description: Waveform visibility can be changed locally in the footer without altering the audio capture hook or reducer.
    examples:
      - file: frontend/src/components/BottomBar.tsx
        location: frontend/src/components/BottomBar.tsx:18-23
        snippet: "<div className=\"mb-3\">\n  <WaveformBar amplitudes={amplitudes} active={isRecording} />\n</div>"
    prevalence: common
  - category: structure
    pattern: WaveformBar uses `active` only for styling.
    description: The component currently always mounts a canvas and repaints it; inactive state only switches color.
    examples:
      - file: frontend/src/components/WaveformBar.tsx
        location: frontend/src/components/WaveformBar.tsx:21-27
        snippet: "const activeColor = ...\nconst inactiveColor = ...\nctx.fillStyle = active ? activeColor : inactiveColor"
    prevalence: common
  - category: architecture
    pattern: Waveform samples remain available as silent baseline when analyser is absent.
    description: `useWaveform` intentionally keeps a stable silent array when not recording, so hiding the component can be done purely in rendering.
    examples:
      - file: frontend/src/hooks/useWaveform.ts
        location: frontend/src/hooks/useWaveform.ts:34-59
        snippet: "if (analyser !== null) { ... } else if (wasActiveRef.current) { ... setAmplitudes(new Uint8Array(WAVEFORM_BINS).fill(128)) }"
    prevalence: common

