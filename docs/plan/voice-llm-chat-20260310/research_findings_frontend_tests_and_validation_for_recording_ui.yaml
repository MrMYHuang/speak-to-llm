    - name: @testing-library/user-event
      purpose_for_domain: Click and keyboard simulation.

recommended_test_additions:
  - title: BottomBar conditional rendering by phase
    target_file: /Users/myh/Documents/speak-to-llm/frontend/src/components/BottomBar.test.tsx
    rationale: The visibility requirement is implemented at the footer composition point, where `isRecording` is already derived.
    assertions:
      - render BottomBar with `phase="idle"` and assert no `canvas[aria-hidden="true"]` is present
      - render BottomBar with `phase="requesting-mic"` and assert no waveform canvas is present
      - render BottomBar with `phase="recording"` and assert the waveform canvas is present
      - render BottomBar with `phase="processing"` and assert the waveform canvas is removed again
    supporting_references:
      - frontend/src/components/BottomBar.tsx:14-23
      - frontend/src/components/WaveformBar.tsx:40-47
  - title: App integration toggle for show/hide behavior
    target_file: /Users/myh/Documents/speak-to-llm/frontend/src/App.toggle.test.tsx
    rationale: Existing recording toggle tests already mock `useAudioStream` and cover user flows, so one additional integration assertion fits the current test style.
    assertions:
      - initial render shows no waveform canvas while capture state is idle
      - after clicking `Start recording`, waveform canvas appears while the stop button is shown
      - after clicking `Stop recording`, waveform canvas disappears while processing state is shown
    supporting_references:
      - frontend/src/App.toggle.test.tsx:78-99
      - frontend/src/App.tsx:57-65
      - frontend/src/App.tsx:129-134
  - title: Keep WaveformBar drawing tests separate from visibility tests
    target_file: /Users/myh/Documents/speak-to-llm/frontend/src/components/WaveformBar.test.tsx
    rationale: `WaveformBar` itself controls drawing/styling, not whether it is mounted; if test coverage is added here, it should stay focused on canvas behavior like `aria-hidden` or inactive/active styling.
    assertions:
      - canvas renders with `aria-hidden="true"`
      - canvas effect tolerates a missing 2D context in jsdom via mocked `getContext`
    supporting_references:
      - frontend/src/components/WaveformBar.tsx:11-16
      - frontend/src/components/WaveformBar.tsx:40-47

