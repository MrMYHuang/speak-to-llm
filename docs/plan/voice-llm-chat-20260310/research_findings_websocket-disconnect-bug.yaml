related_conventions:
  naming_patterns_in_domain: Server frames use `type`-tagged JSON messages; frontend action names are SCREAMING_SNAKE and backend websocket state enum uses `_State`.
  structure_of_domain: Backend keeps a single connection-local state machine; frontend separates websocket lifecycle, reducer state, and assistant rendering helpers.
  error_handling_in_domain: Backend logs and re-raises send-time disconnects; frontend ignores unparseable messages and treats socket errors/close as lifecycle events.
  testing_in_domain: Existing tests emphasize round-trip correctness for happy-path, unicode, large unicode payloads, and coarse disconnect handling.
  documentation_in_domain: Inline docstrings/comments describe websocket protocol and reconnect policy.

