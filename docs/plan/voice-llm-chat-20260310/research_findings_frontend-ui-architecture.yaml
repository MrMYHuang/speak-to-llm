plan_id: voice-llm-chat-20260310
objective: Build a fullstack voice-first LLM chat app (React+Vite7+TS frontend, Python backend)
focus_area: frontend-ui-architecture
created_at: "2026-03-10"
created_by: gem-team/gem-researcher
status: completed

tldr: |
  - Single-page React+Vite7+TypeScript app; no router needed — one view, multiple state phases.
  - State machine pattern (idle→recording→processing→responding) via useReducer; MediaRecorder+WebSocket refs kept outside React render cycle.
  - Four UI zones: TopBar (connection status), ChatThread (scrollable messages), WaveformBar (live amplitude), BottomBar (mic button + transcript preview).
  - Cyberpunk theme via Tailwind CSS 4 custom tokens: near-black bg (#0a0a0f), neon-cyan (#00FFFF), neon-pink (#FF00FF), Orbitron/Rajdhani fonts, CSS box-shadow glow utilities.
  - Key risks: browser MIME type variability (audio/webm;codecs=opus preferred), microphone permission UX, WebSocket reconnection on backend restart, Safari MediaRecorder gaps.

research_metadata:
  methodology: >
    Web research (Vite 7 best practices 2025, React MediaRecorder+WebSocket hook patterns,
    cyberpunk Tailwind CSS themes), cross-referenced with known browser API constraints and
    React state management patterns for audio/streaming apps.
  tools_used:
    - web_search
    - bash (Node.js logic verification)
  scope: >
    Full frontend architecture: folder layout, component tree, state model, styling system,
    dependency set, and edge-case risks. Backend interface surface included only at the
    WebSocket message contract boundary.
  confidence: high
  coverage: 95  # workspace is empty; findings are design-phase recommendations grounded in research

