related_conventions:
  naming_patterns_in_domain: "Websocket event types use explicit string discriminators (`transcript`, `llm_response`, `status`, `error`) in both backend payloads and frontend parsing (`backend/app/ws/audio.py:144-186`, `frontend/src/types/ws.ts:2-43`). Frontend render parsing uses `kind: 'text' | 'think'` as a second discriminator (`frontend/src/utils/assistantMessage.ts:1-35`)."
  structure_of_domain: "Backend performs transformation before transport; frontend transport/parsing/reducer layers treat assistant text as opaque until `MessageBubble` render time (`backend/app/ws/audio.py:166-185`, `frontend/src/types/ws.ts:16-43`, `frontend/src/store/chatReducer.ts:151-158`, `frontend/src/components/MessageBubble.tsx:8-38`)."
  error_handling_in_domain: "Backend catches transcription and LLM connection failures and emits `error` websocket messages (`backend/app/ws/audio.py:134-164`). Frontend websocket hook ignores unparseable frames and dispatches `WS_ERROR` on socket errors (`frontend/src/hooks/useWebSocket.ts:104-129`)."
  testing_in_domain: "Backend tests focus on websocket frame ordering, sanitization, history persistence, unicode, and disconnects (`backend/tests/test_ws_audio.py`). Frontend tests focus on parser correctness and websocket-message parsing rather than assistant-rendering interactions (`frontend/src/utils/assistantMessage.test.ts`, `frontend/src/types/ws.test.ts`)."
  documentation_in_domain: "README documents the websocket protocol and defines `llm_response` as a single text payload (`README.md:89-99`)."

