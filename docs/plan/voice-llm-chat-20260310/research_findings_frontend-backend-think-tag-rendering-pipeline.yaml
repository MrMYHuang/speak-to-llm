open_questions:
  - question: "Should think content become available through the existing `/ws/audio` `llm_response.text` field, or through a different transport/state shape?"
    context: "The current live pipeline removes think text in `backend/app/ws/audio.py:166-185`, while the existing frontend parser only operates if raw tags are already present in `message.text` (`frontend/src/components/MessageBubble.tsx:8-38`)."
  - question: "Should malformed/open-ended think markers continue to be truncated on the backend if the frontend is expected to render think blocks?"
    context: "Backend sanitizer truncates from the first remaining `<think` onward (`backend/app/ws/audio.py:31-34`), whereas the frontend splitter only handles complete `<think>...</think>` matches (`frontend/src/utils/assistantMessage.ts:6-35`)."

gaps:
  - area: End-to-end frontend/backend think rendering coverage
    description: "No current automated test drives a backend reply containing think tags through the real websocket, reducer, and UI rendering path, because backend tests assert sanitization and frontend tests inject tagged strings directly."
    impact: "Coupling between backend sanitization and frontend think rendering is only inferable by combining separate test suites; regressions across the seam would not be caught by one integrated test."
  - area: Interactive UI behavior for think blocks
    description: "No current component or application test covers click-to-collapse, click-to-expand, focus behavior, or distinct typography for think segments."
    impact: "Any future interactive think-block behavior would add new state and accessibility surface without existing regression coverage in the inspected frontend tests."
