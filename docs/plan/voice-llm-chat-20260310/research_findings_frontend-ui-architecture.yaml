related_conventions:
  naming_patterns_in_domain: >
    Components: PascalCase files in src/components/.
    Hooks: useXxx in src/hooks/.
    Types: PascalCase interfaces/types in src/types/.
    Constants: SCREAMING_SNAKE in src/constants/.
    CSS classes: Tailwind utilities preferred; custom classes use kebab-case with cp- prefix (cp-glow-cyan).

  structure_of_domain: |
    src/
    ├── components/
    │   ├── TopBar.tsx
    │   ├── ChatThread.tsx
    │   ├── MessageBubble.tsx
    │   ├── WaveformBar.tsx
    │   ├── BottomBar.tsx
    │   ├── MicButton.tsx
    │   └── StatusOverlay.tsx
    ├── hooks/
    │   ├── useAudioStream.ts    # MediaRecorder + mic permission
    │   ├── useWebSocket.ts      # WS lifecycle + message dispatch
    │   └── useWaveform.ts       # AudioContext AnalyserNode + canvas drawing
    ├── store/
    │   └── chatReducer.ts       # State machine: ChatState + Action union + reducer fn
    ├── types/
    │   ├── chat.ts              # Message, Phase, ChatState types
    │   └── ws.ts                # ServerMessage discriminated union
    ├── constants/
    │   └── config.ts            # WS_URL, AUDIO_MIME_TYPE, CHUNK_INTERVAL_MS
    ├── styles/
    │   └── index.css            # CSS custom property tokens + Tailwind base
    ├── App.tsx                  # Root: useReducer + hooks wiring
    └── main.tsx                 # Vite entry; StrictMode

  error_handling_in_domain: >
    getUserMedia denial → dispatch ERROR phase with user-friendly message; show retry prompt.
    WebSocket close/error → wsStatus='error'; auto-reconnect with exponential backoff (max 5 retries).
    MediaRecorder.onerror → stop recording, dispatch ERROR, log details.
    Unsupported MIME type → fallback: audio/webm → audio/ogg → audio/mp4 via MediaRecorder.isTypeSupported().

  testing_in_domain: >
    Vitest + @testing-library/react for component unit tests.
    Mock WebSocket via mock-socket or vi.stubGlobal.
    Mock getUserMedia via navigator.mediaDevices stub.
    E2E: Playwright with microphone permission override in browser context.

  documentation_in_domain: >
    JSDoc on hook return types and reducer actions.
    README.md documents env vars (VITE_WS_URL), dev setup, and Tailwind theme token reference.

