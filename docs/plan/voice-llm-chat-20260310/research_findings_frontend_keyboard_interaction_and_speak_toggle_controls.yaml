plan_id: voice-llm-chat-20260310
objective: allow the speak / stop control to be triggered by the space key while preserving the existing voice-chat UX.
focus_area: frontend keyboard interaction and speak-toggle controls
created_at: "2026-03-13T00:00:00Z"
created_by: research-specialist
status: completed

tldr: |
  - The speak/stop toggle is orchestrated in `frontend/src/App.tsx` via `handleMicToggle`, which decides between start, stop, cancel, or no-op based on `captureState` plus reducer `phase`.
  - The visible control is a native `<button>` in `frontend/src/components/MicButton.tsx`, so focused keyboard activation already works through built-in Enter/Space behavior; this is covered by `frontend/src/App.toggle.test.tsx`.
  - There are no existing custom keyboard listeners or text inputs in `frontend/src`, so a new unfocused/global Space shortcut would most naturally be added near `handleMicToggle` in `App.tsx` or a hook owned by `App`.
  - Primary planning risks are Space scrolling the page when focus is outside the button, interfering with future focused inputs, and preserving button accessibility semantics/disabled states.
  - Planner handoff files: `frontend/src/App.tsx`, `frontend/src/components/MicButton.tsx`, `frontend/src/components/BottomBar.tsx`, `frontend/src/App.toggle.test.tsx`, `frontend/src/store/chatReducer.ts`, `frontend/src/hooks/useAudioStream.ts`.

