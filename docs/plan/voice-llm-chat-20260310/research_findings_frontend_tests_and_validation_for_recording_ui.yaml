open_questions:
  - question: Should `requesting-mic` count as "recording active" for waveform visibility, or should the waveform remain hidden until `phase === 'recording'` only?
    context: Existing footer logic names the boolean `isRecording` and derives it strictly from `phase === 'recording'` (`frontend/src/components/BottomBar.tsx:16`), while the mic button treats both `requesting-mic` and `recording` as pressed (`frontend/src/components/MicButton.tsx:56`).

gaps:
  - area: direct waveform visibility tests
    description: No existing test currently asserts waveform mount/unmount or canvas presence across recording phases.
    impact: Implementers can change visibility behavior without immediate regression coverage unless new BottomBar/App assertions are added.
