        snippet: "it('toggles with keyboard activation for Enter and Space', async () => { ... await user.keyboard('{Enter}') ... await user.keyboard(' ') ... })"
    prevalence: common
  - category: structure
    pattern: capture-state override protects stop/cancel behavior even if reducer phase drifts
    description: UI phase is derived from live capture state first, which lets the same toggle stop or cancel ongoing capture independent of reducer transitions.
    examples:
