  - id: task-007
    title: Frontend — state machine and audio/WebSocket hooks
    description: |
      Implement the core logic layer under frontend/src/:

      store/chatReducer.ts:
        - Phase type: 'idle' | 'requesting-mic' | 'recording' | 'processing' | 'responding' | 'error'
        - ChatState: { phase, wsStatus, transcript, messages: Message[], errorMessage }
        - chatReducer(state, action) → ChatState handling all phase transitions
        - Message type: { id, role: 'user'|'assistant', text, timestamp }

      hooks/useWebSocket.ts:
        - Connects to VITE_WS_URL env var (default ws://localhost:5173/ws/audio)
        - Reconnects on close codes 1006/1011 with exponential back-off
        - Parses incoming JSON ServerMessage frames; dispatches chatReducer actions
        - Returns { wsRef: MutableRefObject<WebSocket|null>, wsStatus }

      hooks/useAudioStream.ts:
        - getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } })
        - Creates AudioContext at 16000 Hz; connects AnalyserNode for waveform
        - Uses AudioWorkletProcessor (or ScriptProcessorNode fallback) to capture
          PCM Int16 chunks and send as binary WebSocket frames
        - startRecording(): sends JSON {"event":"start","sample_rate":16000,"encoding":"pcm_int16"}
          then begins streaming
        - stopRecording(): sends JSON {"event":"stop"}, stops MediaRecorder
        - Returns { startRecording, stopRecording, analyserRef }

      hooks/useWaveform.ts:
        - Reads AnalyserNode frequency data via requestAnimationFrame loop
        - Returns { amplitudes: Uint8Array } for canvas rendering in WaveformBar
    agent: gem-team/gem-implementer
    priority: high
    status: done
