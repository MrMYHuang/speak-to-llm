        location: frontend/src/App.tsx:23-28
        snippet: "const controlPhase = captureState === 'idle' ? state.phase : captureState === 'starting' ? 'requesting-mic' : 'recording'"
      - file: frontend/src/App.tsx
        location: frontend/src/App.tsx:31-33
        snippet: "if (captureState !== 'idle') { stopRecording(); return }"
      - file: frontend/src/App.toggle.test.tsx
        location: frontend/src/App.toggle.test.tsx:127-147
        snippet: "stops an active capture even after the reducer enters the error phase"
    prevalence: common
  - category: keyboard
    pattern: no custom global keyboard handling exists today
    description: repository search found no `keydown`/`keyup` listeners or component key handlers in `frontend/src`; current keyboard behavior is limited to native focused control activation.
    examples:
