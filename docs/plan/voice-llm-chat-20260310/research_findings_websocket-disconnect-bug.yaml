plan_id: voice-llm-chat-20260310
objective: Investigate websocket disconnect during llm_response send
focus_area: websocket-disconnect-bug
created_at: "2026-03-12"
created_by: copilot-cli
status: completed

tldr: |
  - Backend send path in `backend/app/ws/audio.py` logs and re-raises disconnects from `websocket.send_text`; the observed `state=LLM_CALLING` is expected because state resets to IDLE only after the llm_response send succeeds.
  - Existing backend and frontend tests already prove unicode and moderately large unicode llm_response payloads round-trip correctly, but there is no test for a disconnect that occurs during `llm_response` send or for frontend close behavior around that message.
  - Frontend WebSocket code does not close on `llm_response`, payload content, `<think>` tags, or unicode; the only explicit close path is React cleanup/unmount with code 1000.
  - The observed 5.6 KB payload size is small for WebSocket text frames; special characters are much less likely than the client/browser/runtime intentionally or unintentionally closing the socket before or during receipt.

