related_conventions:
  naming_patterns_in_domain: "snake_case modules, descriptive service names (transcriber, llm_client)"
  structure_of_domain: "Router → Service layer → External dependency; no business logic in router"
  error_handling_in_domain: "Catch at service call site in WS handler; serialize to JSON error event; never raise unhandled to ASGI"
  testing_in_domain: "pytest + pytest-asyncio; mock whisper model and openai client for unit tests"
  documentation_in_domain: "Docstrings on service functions; OpenAPI auto-docs via FastAPI at /docs"

open_questions:
  - question: "Should LLM streaming (token-by-token) be used or full-response-at-once?"
    context: >
      Streaming reduces perceived latency but requires the frontend to handle incremental
      llm_token events and reassemble the display. Full-response is simpler to implement.

  - question: "Should conversation history be maintained across utterances?"
    context: >
      Stateless (single-turn) is simpler; multi-turn requires storing message history per
      WebSocket session and trimming to stay within the model's context window.

  - question: "Where should audio resampling happen — frontend or backend?"
    context: >
      Frontend resampling via OfflineAudioContext avoids server dependencies (librosa/scipy)
      and reduces bandwidth (16 kHz vs 48 kHz = 3× less data), but adds frontend complexity.

  - question: "Is py-webrtcvad needed or will frontend always send explicit stop events?"
    context: >
      Push-to-talk (button) = frontend sends stop, no VAD needed.
      Automatic silence detection = either frontend or backend VAD required.

gaps:
  - area: "Frontend audio encoding details"
    description: "Exact MediaRecorder/AudioWorklet output format depends on browser implementation; needs frontend spike."
    impact: "May require adjusting backend PCM conversion (endianness, channel count, sample rate)."

  - area: "Whisper GPU availability"
    description: "Performance with CPU-only Whisper on developer machines not benchmarked."
    impact: "On CPU, base model takes ~3–8 s per utterance; may feel slow. fp16 must be False on CPU."

  - area: "LM Studio model identifier format"
    description: "Exact model name string format varies by downloaded model; not tested."
    impact: "Wrong model ID causes 404 from LM Studio; needs runtime GET /v1/models call or clear config docs."

  - area: "Authentication / security"
    description: "No auth between browser and backend WebSocket defined."
    impact: "Acceptable for local dev; production requires token-based auth or origin validation."
