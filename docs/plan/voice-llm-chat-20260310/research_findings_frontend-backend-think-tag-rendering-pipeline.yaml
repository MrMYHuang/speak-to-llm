patterns_found:
  - category: architecture
    pattern: Backend sanitizes assistant output before frontend delivery
    description: Raw LLM output is returned by `LLMClient.chat`, but the websocket layer removes think blocks before sending or storing assistant content.
    examples:
      - file: backend/app/services/llm_client.py
        location: backend/app/services/llm_client.py:25-43
        snippet: "return response.choices[0].message.content or \"\""
      - file: backend/app/ws/audio.py
        location: backend/app/ws/audio.py:166-185
        snippet: "sanitized_reply = sanitize_llm_reply(reply) ... conversation_history.extend([user_message, {\"role\": \"assistant\", \"content\": sanitized_reply}]) ... await _send({\"type\": \"llm_response\", \"text\": sanitized_reply})"
    prevalence: common
  - category: structure
    pattern: Frontend stores assistant replies as plain strings and derives think rendering at render time
    description: The reducer preserves only `text` on assistant messages; `MessageBubble` performs the only think-specific transform.
    examples:
      - file: frontend/src/store/chatReducer.ts
        location: frontend/src/store/chatReducer.ts:151-158
        snippet: "{ id: crypto.randomUUID(), role: 'assistant', text: msg.text, timestamp: Date.now() }"
      - file: frontend/src/components/MessageBubble.tsx
        location: frontend/src/components/MessageBubble.tsx:10-10
        snippet: "const assistantSegments = isUser ? [] : splitAssistantMessage(message.text)"
    prevalence: common
  - category: naming
    pattern: Think content is represented as `kind: 'think'` segments on the frontend
    description: Parsing and rendering utilities distinguish assistant text from extracted think blocks using a `kind` discriminator.
    examples:
      - file: frontend/src/utils/assistantMessage.ts
        location: frontend/src/utils/assistantMessage.ts:1-3
        snippet: "export interface AssistantMessageSegment { kind: 'text' | 'think'; text: string }"
      - file: frontend/src/utils/assistantMessage.ts
        location: frontend/src/utils/assistantMessage.ts:20-21
        snippet: "segments.push({ kind: 'think', text: thinkText })"
    prevalence: occasional
  - category: testing
    pattern: Backend and frontend think handling are tested separately, not in one end-to-end path
    description: Backend tests assert sanitized websocket output, while frontend tests assert parsing of already-tagged strings.
    examples:
      - file: backend/tests/test_ws_audio.py
        location: backend/tests/test_ws_audio.py:236-311
        snippet: "assert ws.receive_json() == {\"type\": \"llm_response\", \"text\": sanitized_reply}"
      - file: frontend/src/utils/assistantMessage.test.ts
        location: frontend/src/utils/assistantMessage.test.ts:12-25
        snippet: "expect(splitAssistantMessage('Visible <think>internal reasoning</think> more')).toEqual([...])"
    prevalence: common

