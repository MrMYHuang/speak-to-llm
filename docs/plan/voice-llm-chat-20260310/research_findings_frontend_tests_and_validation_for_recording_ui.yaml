  components_relevant_to_domain:
    - component: App
      responsibility: Owns reducer state and audio hook wiring for the recording footer.
      location: frontend/src/App.tsx
      relationship_to_domain: domain depends on this
    - component: BottomBar
      responsibility: Decides whether the waveform and mic UI are visible/rendered.
      location: frontend/src/components/BottomBar.tsx
      relationship_to_domain: domain depends on this
    - component: WaveformBar
      responsibility: Draws the decorative waveform canvas.
      location: frontend/src/components/WaveformBar.tsx
      relationship_to_domain: domain depends on this
    - component: useAudioStream
      responsibility: Produces `captureState` and `analyserRef` used by the footer.
      location: frontend/src/hooks/useAudioStream.ts
      relationship_to_domain: domain depends on this
  interfaces_used_by_domain:
    - interface: BottomBarProps
      location: frontend/src/components/BottomBar.tsx:7-12
      usage_pattern: Receives `phase`, `transcript`, `onMicToggle`, and `analyserRef`.
    - interface: WaveformBarProps
      location: frontend/src/components/WaveformBar.tsx:3-6
      usage_pattern: Receives `amplitudes` and `active` for canvas rendering.
  data_flow_involving_domain: App derives `controlPhase` from `useAudioStream.captureState` and reducer `phase`, passes that into BottomBar, BottomBar derives `isRecording`, and WaveformBar currently renders on every footer paint with only its `active` styling changing.
  key_relationships_to_domain:
    - from: frontend/src/App.tsx
      to: frontend/src/components/BottomBar.tsx
      relationship: imports
    - from: frontend/src/components/BottomBar.tsx
      to: frontend/src/components/WaveformBar.tsx
