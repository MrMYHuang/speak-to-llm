open_questions:
  - question: Should the planned Space shortcut fire only when the mic button is focused, or anywhere in the app when focus is not inside another interactive element?
    context: Native button support already covers focused activation; the planning decision is about adding an additional unfocused/global shortcut path.
  - question: During `processing`, should a global Space press be ignored exactly like the disabled button, or should it queue/interrupt behavior?
    context: Current button semantics are disabled in `processing` (`frontend/src/components/MicButton.tsx:29-34`), so a new shortcut should be evaluated against that existing contract.

gaps:
  - area: future input surfaces
    description: No text inputs or editable controls exist in current `frontend/src`, so conflict analysis is limited to the current UI and browser/page behavior.
    impact: low; current planner can reason confidently about the present app, but future text-entry features would need fresh exclusion rules for Space handling.
