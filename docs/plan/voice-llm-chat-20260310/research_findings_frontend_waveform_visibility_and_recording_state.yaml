plan_id: voice-llm-chat-20260310
objective: Show the waveform bar during recording and hide it whenever recording is not active.
focus_area: frontend waveform visibility and recording state
created_at: "2026-03-13T15:13:01Z"
created_by: github-copilot
status: completed

tldr: |
  - Recording state is derived in `frontend/src/App.tsx` from `useAudioStream.captureState` and passed to `BottomBar` as `phase`.
  - `WaveformBar` already exists and is always rendered by `frontend/src/components/BottomBar.tsx`; it only changes color via its `active` prop.
  - The minimal/safest UI change is to conditionally render the waveform container in `BottomBar` only when `phase === 'recording'`, leaving `useAudioStream` and `useWaveform` behavior unchanged.
  - Existing frontend validation covers recording toggle state transitions (`App.toggle.test.tsx`) and audio hook lifecycle (`useAudioStream.test.tsx`), but there is no direct test for waveform visibility.

