patterns_found:
  - category: testing
    pattern: Recording UI is currently tested at App integration level, not at BottomBar or WaveformBar component level.
    description: Existing coverage exercises the footer indirectly through `App` toggling and hook state, leaving waveform visibility untested.
    examples:
      - file: frontend/src/App.toggle.test.tsx
        location: frontend/src/App.toggle.test.tsx:78-99
        snippet: "render(<App />) ... await user.click(button) ... screen.getByRole('button', { name: 'Stop recording' })"
      - file: frontend/src/hooks/useAudioStream.test.tsx
        location: frontend/src/hooks/useAudioStream.test.tsx:109-152
        snippet: "const { result } = renderHook(() => useAudioStream(wsRef, dispatch)) ... expect(result.current.captureState).toBe('recording')"
    prevalence: common
  - category: testing
    pattern: Tests are colocated and use jsdom + Testing Library + Vitest.
    description: Component tests live beside the component, start with `// @vitest-environment jsdom`, and use `render`, `screen`, and `userEvent` for behavior assertions.
    examples:
      - file: frontend/src/components/MessageBubble.test.tsx
        location: frontend/src/components/MessageBubble.test.tsx:1-5
        snippet: "// @vitest-environment jsdom\nimport { cleanup, render, screen } from '@testing-library/react'\nimport userEvent from '@testing-library/user-event'"
      - file: frontend/src/App.toggle.test.tsx
        location: frontend/src/App.toggle.test.tsx:1-4
        snippet: "// @vitest-environment jsdom\nimport { cleanup, fireEvent, render, screen } from '@testing-library/react'"
    prevalence: common
  - category: testing
    pattern: Browser-only APIs are stubbed explicitly in tests.
    description: Audio and canvas-related APIs are mocked in `beforeAll`/`beforeEach` rather than assumed to exist in jsdom.
    examples:
      - file: frontend/src/App.toggle.test.tsx
        location: frontend/src/App.toggle.test.tsx:55-65
        snippet: "Object.defineProperty(HTMLCanvasElement.prototype, 'getContext', { ... value: vi.fn(() => null) })"
      - file: frontend/src/hooks/useAudioStream.test.tsx
        location: frontend/src/hooks/useAudioStream.test.tsx:68-100
        snippet: "vi.stubGlobal('AudioContext', ...)\nvi.stubGlobal('AudioWorkletNode', ...)\nvi.stubGlobal('URL', ...)"
    prevalence: common

